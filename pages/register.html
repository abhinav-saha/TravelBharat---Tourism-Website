<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBharat | Register</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/register.css">
</head>
<body>

    <!-- ==================== AUTH PAGE MAIN ==================== -->
    <main class="auth-page" id="auth-page">
        <section class="auth-card" id="register-card">

            <!-- ==================== REGISTER CARD HEADER ==================== -->
            <header class="auth-card__header">
                <a href="../index.html" class="logo-text auth-card__logo">TravelBharat</a>
                <h1 class="auth-card__heading">Create Your Account</h1>
                <p class="auth-card__subtitle">Join TravelBharat and start exploring India's incredible destinations.</p>
            </header>

            <!-- ==================== REGISTER FORM ==================== -->
            <form class="auth-form" id="register-form" novalidate>

                <div class="auth-form__group">
                    <label for="register-fullname" class="auth-form__label">Full Name</label>
                    <input
                        type="text"
                        id="register-fullname"
                        name="fullname"
                        class="auth-form__input"
                        placeholder="Enter your full name"
                        autocomplete="name"
                        required
                        aria-label="Full Name"
                    >
                </div>

                <div class="auth-form__group">
                    <label for="register-email" class="auth-form__label">Email Address</label>
                    <input
                        type="email"
                        id="register-email"
                        name="email"
                        class="auth-form__input"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                        aria-label="Email Address"
                    >
                </div>

                <div class="auth-form__group">
                    <label for="register-password" class="auth-form__label">Password</label>
                    <div class="auth-form__password-wrapper">
                        <input
                            type="password"
                            id="register-password"
                            name="password"
                            class="auth-form__input auth-form__input--password"
                            placeholder="Create a password"
                            autocomplete="new-password"
                            required
                            aria-label="Password"
                        >
                        <button
                            type="button"
                            class="auth-form__toggle-password"
                            id="toggle-password"
                            aria-label="Show password"
                        >
                            <img src="../assets/icons/eye.svg" alt="" class="auth-form__eye-icon">
                        </button>
                    </div>
                </div>

                <div class="auth-form__group">
                    <label for="register-confirm-password" class="auth-form__label">Confirm Password</label>
                    <div class="auth-form__password-wrapper">
                        <input
                            type="password"
                            id="register-confirm-password"
                            name="confirm-password"
                            class="auth-form__input auth-form__input--password"
                            placeholder="Re-enter your password"
                            autocomplete="new-password"
                            required
                            aria-label="Confirm Password"
                        >
                        <button
                            type="button"
                            class="auth-form__toggle-password"
                            id="toggle-confirm-password"
                            aria-label="Show confirm password"
                        >
                            <img src="../assets/icons/eye.svg" alt="" class="auth-form__eye-icon">
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary auth-form__submit" id="register-submit">Create Account</button>

                <!-- ==================== BOTTOM LINKS ==================== -->
                <p class="auth-form__signup-text">
                    Already have an account?
                    <a href="login.html" class="auth-form__link auth-form__link--strong" id="login-link">Login</a>
                </p>

            </form>

            <!-- ==================== REGISTER CARD FOOTER ==================== -->
            <footer class="auth-card__footer">
                <a href="../index.html" class="auth-card__back-link" id="back-to-home-link">&larr; Back to Home</a>
            </footer>

        </section>
    </main>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
