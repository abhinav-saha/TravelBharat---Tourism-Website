<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBharat | Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <!-- ==================== AUTH PAGE MAIN ==================== -->
    <main class="auth-page" id="auth-page">
        <section class="auth-card" id="login-card">

            <!-- ==================== LOGIN CARD HEADER ==================== -->
            <header class="auth-card__header">
                <a href="../index.html" class="logo-text auth-card__logo">TravelBharat</a>
                <h1 class="auth-card__heading">Welcome Back</h1>
                <p class="auth-card__subtitle">Login to continue exploring incredible destinations across India.</p>
            </header>

            <!-- ==================== LOGIN FORM ==================== -->
            <form class="auth-form" id="login-form" >

                <div class="auth-form__group">
                    <label for="login-email" class="auth-form__label">Email Address</label>
                    <input
                        type="email"
                        id="login-email"
                        name="email"
                        class="auth-form__input"
                        placeholder="you@example.com"
                        autocomplete="email"
                        required
                        aria-label="Email Address"
                    >
                </div>

                <div class="auth-form__group">
                    <label for="login-password" class="auth-form__label">Password</label>
                    <div class="auth-form__password-wrapper">
                        <input
                            type="password"
                            id="login-password"
                            name="password"
                            class="auth-form__input auth-form__input--password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                            aria-label="Password"
                        >
                        <button
                            type="button"
                            class="auth-form__toggle-password"
                            id="toggle-password"
                            aria-label="Show password"
                        >
                            <img src="../assets/icons/eye.svg" alt="" class="auth-form__eye-icon">
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary auth-form__submit" id="login-submit">Login</button>

                <!-- ==================== EXTRA LINKS ==================== -->
                <div class="auth-form__extra-links">
                    <a href="#" class="auth-form__link" id="forgot-password-link">Forgot Password?</a>
                </div>

                <p class="auth-form__signup-text">
                    Don't have an account?
                    <a href="register.html" class="auth-form__link auth-form__link--strong" id="create-account-link">Create Account</a>
                </p>

            </form>

            <!-- ==================== LOGIN CARD FOOTER ==================== -->
            <footer class="auth-card__footer">
                <a href="../index.html" class="auth-card__back-link" id="back-to-home-link">&larr; Back to Home</a>
            </footer>

        </section>
    </main>
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
